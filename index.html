<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a0a1a" />
    <title>AsciiCutie - Photo Booth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              pink: {
                50: '#fdf2f8', 100: '#fce7f3', 200: '#fbcfe8', 300: '#f9a8d4',
                400: '#f472b6', 500: '#ec4899', 600: '#db2777', 700: '#be185d',
              },
              lavender: {
                50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe',
                400: '#c084fc', 500: '#a855f7', 600: '#9333ea',
              }
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'sparkle': 'sparkle 1.5s ease-in-out infinite',
              'heartbeat': 'heartbeat 1.2s ease-in-out infinite',
              'slide-up': 'slideUp 0.5s ease-out',
              'bounce-in': 'bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              sparkle: {
                '0%, 100%': { opacity: 1, transform: 'scale(1)' },
                '50%': { opacity: 0.5, transform: 'scale(0.8)' },
              },
              heartbeat: {
                '0%, 100%': { transform: 'scale(1)' },
                '14%': { transform: 'scale(1.15)' },
                '28%': { transform: 'scale(1)' },
                '42%': { transform: 'scale(1.15)' },
                '70%': { transform: 'scale(1)' },
              },
              slideUp: {
                '0%': { opacity: 0, transform: 'translateY(20px)' },
                '100%': { opacity: 1, transform: 'translateY(0)' },
              },
              bounceIn: {
                '0%': { opacity: 0, transform: 'scale(0.3)' },
                '50%': { transform: 'scale(1.05)' },
                '70%': { transform: 'scale(0.9)' },
                '100%': { opacity: 1, transform: 'scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body {
        font-family: 'Quicksand', sans-serif;
        background: linear-gradient(135deg, #fdf2f8 0%, #faf5ff 50%, #fce7f3 100%);
        overflow: hidden;
        position: fixed;
        width: 100%;
        height: 100%;
        /* Prevent pull-to-refresh and bounce on mobile */
        overscroll-behavior: none;
      }
      /* Use dvh for mobile to account for address bar */
      #root { height: 100vh; height: 100dvh; }

      /* Cute scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #fce7f3; border-radius: 10px; }
      ::-webkit-scrollbar-thumb { background: #f9a8d4; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #f472b6; }

      /* Range slider styling */
      input[type="range"] {
        -webkit-appearance: none;
        height: 6px;
        border-radius: 5px;
        background: linear-gradient(90deg, #fbcfe8, #e9d5ff);
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ec4899, #a855f7);
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(236, 72, 153, 0.4);
        transition: transform 0.2s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
